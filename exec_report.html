<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Digital Division — Executive Report v5</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;400;500;600;700&family=DM+Sans:opsz,wght@9..40,300;9..40,400;9..40,500;9..40,600;9..40,700&family=JetBrains+Mono:wght@400;500&display=swap');
:root{
--bg:#0B0E1A;--bg2:#131729;--bg3:#1A1F36;--bg4:#222842;
--gold:#D4A84B;--gold2:#E8C36A;--gold3:rgba(212,168,75,.15);
--w:#EEEEF0;--w7:rgba(238,238,240,.7);--w4:rgba(238,238,240,.4);--w15:rgba(238,238,240,.12);--w08:rgba(238,238,240,.06);
--g:#34D399;--gbg:rgba(52,211,153,.12);--gd:#15803D;
--a:#FBBF24;--abg:rgba(251,191,36,.12);
--r:#F87171;--rbg:rgba(248,113,113,.12);
}
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:'DM Sans',sans-serif;background:var(--bg);color:var(--w);overflow:hidden;height:100vh}

/* Loader */
#L{position:fixed;inset:0;z-index:999;background:var(--bg);display:flex;flex-direction:column;align-items:center;justify-content:center;gap:24px;transition:opacity .6s}
#L.done{opacity:0;pointer-events:none}
#L .sp{width:48px;height:48px;border:2px solid var(--bg3);border-top-color:var(--gold);border-radius:50%;animation:spin .7s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}
#L p{color:var(--gold);font-size:11px;letter-spacing:4px;text-transform:uppercase;transition:opacity .3s}
#L-bar-wrap{width:260px;height:3px;background:var(--bg3);border-radius:2px;overflow:hidden}
#L-bar{height:100%;width:0%;background:linear-gradient(90deg,var(--gold),var(--gold2));border-radius:2px;transition:width .4s ease}

/* Deck */
#D{width:1440px;height:810px;position:relative;margin:auto;top:50%;transform:translateY(-50%)}
/* Slide transitions with direction */
.S{position:absolute;inset:0;opacity:0;pointer-events:none;transform:translateX(40px);transition:opacity .42s ease,transform .42s cubic-bezier(.22,1,.36,1)}
.S.on{opacity:1;pointer-events:all;transform:translateX(0)}
.S.out-left{opacity:0;transform:translateX(-40px);transition:opacity .3s ease,transform .3s ease}
.S.out-right{opacity:0;transform:translateX(40px);transition:opacity .3s ease,transform .3s ease}

/* Nav */
#N-wrap{position:fixed;bottom:18px;left:50%;transform:translateX(-50%);display:flex;flex-direction:column;align-items:center;gap:10px;z-index:100}
#dots{display:flex;gap:5px;align-items:center}
.dot-nav{width:6px;height:6px;border-radius:50%;background:var(--w15);cursor:pointer;transition:all .25s;border:none;padding:0}
.dot-nav.active{width:20px;border-radius:3px;background:var(--gold)}
.dot-nav:hover:not(.active){background:var(--w4)}
#N{display:flex;align-items:center;gap:14px;background:rgba(11,14,26,.92);backdrop-filter:blur(18px);padding:8px 22px;border-radius:28px;border:1px solid var(--w15)}
#N button{background:none;border:none;color:var(--gold);cursor:pointer;font-size:16px;padding:4px 10px;border-radius:6px;transition:background .2s,transform .1s}
#N button:hover{background:var(--gold3);transform:scale(1.1)}
#N button:active{transform:scale(.92)}
#N button:disabled{opacity:.2}
#N-title{color:var(--w4);font-size:12px;font-family:'DM Sans',sans-serif;min-width:180px;text-align:center;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
#ct{color:var(--gold);font-size:12px;font-family:'JetBrains Mono',monospace;min-width:44px;text-align:center}
#P{position:fixed;top:0;left:0;height:2px;background:linear-gradient(90deg,var(--gold),var(--gold2));transition:width .3s;z-index:100;box-shadow:0 0 8px rgba(212,168,75,.4)}
/* Keyboard hint overlay */
#kh{position:fixed;bottom:90px;left:50%;transform:translateX(-50%);background:rgba(11,14,26,.85);backdrop-filter:blur(10px);border:1px solid var(--w15);border-radius:12px;padding:10px 24px;display:flex;gap:20px;align-items:center;z-index:99;transition:opacity .5s;font-size:13px;color:var(--w4)}
#kh span{display:flex;align-items:center;gap:6px}
#kh kbd{background:var(--bg3);border:1px solid var(--w15);border-radius:5px;padding:2px 8px;font-size:11px;font-family:'JetBrains Mono',monospace;color:var(--w)}
#kh.fade{opacity:0;pointer-events:none}

/* ── COVER — Glassmorphism —— */
.S-cover{background:var(--bg);position:relative;overflow:hidden;display:flex;align-items:center;padding:0 100px}
.S-cover::before{content:'';position:absolute;inset:0;background:radial-gradient(ellipse 70% 60% at 30% 50%,rgba(212,168,75,.06) 0%,transparent 70%);pointer-events:none}
.S-cover canvas{position:absolute;inset:0}
.cv{position:relative;z-index:1;
  background:rgba(11,14,26,.45);
  backdrop-filter:blur(24px);
  -webkit-backdrop-filter:blur(24px);
  border:1px solid rgba(212,168,75,.12);
  border-radius:24px;
  padding:48px 64px;
  box-shadow:0 24px 64px rgba(0,0,0,.4);
}
.cv .c1{font-size:12px;letter-spacing:4px;text-transform:uppercase;color:var(--gold);font-weight:500;opacity:0;animation:fu .6s .3s forwards}
.cv .c2{font-size:18px;color:var(--w4);margin-top:20px;font-weight:300;opacity:0;animation:fu .6s .5s forwards}
.cv h1{font-family:'Space Grotesk',sans-serif;font-size:66px;font-weight:700;line-height:1.05;margin:14px 0;max-width:720px;opacity:0;animation:fu .8s .7s forwards}
.cv .c3{color:var(--gold2);font-size:20px;font-weight:400;margin-top:10px;opacity:0;animation:fu .6s 1s forwards}
.cv .c4{color:var(--w4);font-size:16px;margin-top:36px;padding-top:18px;border-top:2px solid var(--gold);display:inline-block;opacity:0;animation:fu .6s 1.2s forwards}
.cvf{position:absolute;bottom:28px;left:100px;color:var(--w15);font-size:12px;z-index:1}
.stripes{position:absolute;right:0;top:0;bottom:0;width:260px;display:flex;gap:14px;padding:0 24px;align-items:stretch}
.stripes div{flex:1;border-radius:3px}
.stripes div:nth-child(odd){background:rgba(212,168,75,.3)}
.stripes div:nth-child(even){background:rgba(255,255,255,.04)}
@keyframes fu{from{opacity:0;transform:translateY(18px)}to{opacity:1;transform:translateY(0)}}

/* ── CONTENT SLIDE ── */
.S-ct{background:var(--bg);display:flex;flex-direction:column}
.S-ct .hd{padding:28px 64px 0;display:flex;justify-content:space-between;align-items:baseline}
.S-ct .hd h2{
  font-family:'Space Grotesk',sans-serif;font-size:32px;font-weight:600;
  background:linear-gradient(90deg,var(--w) 60%,var(--gold2));
  -webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;
}
.S-ct .hd .q{color:var(--gold);font-size:14px;font-weight:500}
.S-ct .hl{margin:14px 64px 0;height:1px;background:linear-gradient(90deg,var(--gold),transparent 50%)}
.S-ct .bd{flex:1;padding:22px 64px 0;display:flex;flex-direction:column;overflow:hidden}
.S-ct .ft{padding:10px 64px;color:var(--w15);font-size:11px}

/* ── COMPONENTS ── */

/* KPI strip */
.kpi-strip{display:flex;gap:16px;margin-bottom:18px}
.kpi{flex:1;background:var(--bg2);border:1px solid var(--w15);border-radius:14px;padding:20px;text-align:center;transition:border-color .3s,transform .3s,box-shadow .3s;cursor:default}
.kpi:hover{border-color:var(--gold3);transform:translateY(-4px);box-shadow:0 8px 24px rgba(212,168,75,.08)}
.kpi .kv{font-family:'Space Grotesk',sans-serif;font-size:40px;font-weight:700;line-height:1}
.kpi .kl{font-size:14px;color:var(--w7);margin-top:6px;font-weight:500}
.kpi .ks{font-size:13px;color:var(--w4);margin-top:2px}
.kpi .ring{width:72px;height:72px;margin:0 auto 10px;transform:rotate(-90deg)}
.kpi .ring circle{fill:none;stroke-width:4;stroke-linecap:round}
.kpi .ring .rb{stroke:var(--w08)}
.kpi .ring .rf{transition:stroke-dashoffset 1.5s ease}

/* Status grid — RAG horizontal bars */
.sg{display:flex;flex-direction:column;gap:8px;flex:1;justify-content:center}
.rag-row{background:var(--bg2);border:1px solid var(--w15);border-radius:12px;padding:14px 20px;transition:all .25s;cursor:default;position:relative;overflow:hidden}
.rag-row:hover{transform:translateX(3px)}
.rag-row.rag-g{border-color:rgba(52,211,153,.2)}.rag-row.rag-a{border-color:rgba(251,191,36,.2)}.rag-row.rag-r{border-color:rgba(248,113,113,.25)}
.rag-row.rag-a .rag-pulse,.rag-row.rag-r .rag-pulse{position:absolute;top:12px;right:14px;width:7px;height:7px;border-radius:50%}
.rag-row.rag-a .rag-pulse{background:var(--a);box-shadow:0 0 0 0 var(--a);animation:pulse-a 2s infinite}
.rag-row.rag-r .rag-pulse{background:var(--r);box-shadow:0 0 0 0 var(--r);animation:pulse-r 2s infinite}
@keyframes rag-pa{0%{box-shadow:0 0 0 0 rgba(251,191,36,.5)}70%{box-shadow:0 0 0 8px rgba(251,191,36,0)}100%{box-shadow:0 0 0 0 rgba(251,191,36,0)}}
@keyframes rag-pr{0%{box-shadow:0 0 0 0 rgba(248,113,113,.5)}70%{box-shadow:0 0 0 8px rgba(248,113,113,0)}100%{box-shadow:0 0 0 0 rgba(248,113,113,0)}}
.rag-top{display:flex;align-items:center;gap:10px;margin-bottom:8px}
.rag-name{font-weight:600;font-size:15px;flex:1}
.badge{padding:4px 12px;border-radius:5px;font-size:11px;font-weight:600;letter-spacing:.5px;text-transform:uppercase}
.bg{background:var(--gbg);color:var(--g)}.ba{background:var(--abg);color:var(--a)}.br{background:var(--rbg);color:var(--r)}
.rag-bar-wrap{height:4px;background:var(--w08);border-radius:2px;overflow:hidden;margin-bottom:7px}
.rag-bar{height:100%;border-radius:2px;width:0;transition:width 1s cubic-bezier(.22,1,.36,1)}
.rag-g .rag-bar{background:linear-gradient(90deg,var(--g),rgba(52,211,153,.4));width:88%}
.rag-a .rag-bar{background:linear-gradient(90deg,var(--a),rgba(251,191,36,.4));width:62%}
.rag-r .rag-bar{background:linear-gradient(90deg,var(--r),rgba(248,113,113,.4));width:35%}
.rag-comment{font-size:12px;color:var(--w4);line-height:1.4}
/* dot preserved for other uses */
.dot{width:9px;height:9px;border-radius:50%;flex-shrink:0;box-shadow:0 0 8px currentColor}
.dot-g{background:var(--g);color:var(--g)}.dot-a{background:var(--a);color:var(--a)}.dot-r{background:var(--r);color:var(--r)}
/* KPI sparkline */
.kpi-spark{display:flex;align-items:center;justify-content:center;gap:5px;margin-top:6px;font-size:13px;font-weight:600}
.kpi-spark svg{overflow:visible}
.spark-up{color:var(--g)}.spark-down{color:var(--r)}.spark-flat{color:var(--w4)}

/* Tables — highlight max value */
.tb td.num-hi{background:rgba(52,211,153,.08)!important;color:var(--g);font-weight:700}
.bt td.num-hi{background:rgba(52,211,153,.08)!important;color:var(--g);font-weight:700}
/* Tables */
.tb{width:100%;border-collapse:separate;border-spacing:0 4px;font-size:14px;flex:1}
.tb th{padding:10px 14px;font-size:12px;font-weight:600;text-transform:uppercase;letter-spacing:.8px;color:var(--gold);text-align:left;border-bottom:1px solid var(--w15)}
.tb td{padding:12px 14px;background:var(--bg2);transition:background .2s}
.tb td:first-child{border-radius:8px 0 0 8px}
.tb td:last-child{border-radius:0 8px 8px 0}
.tb tr:hover td{background:var(--bg3)}
.tb .tot td{background:var(--bg3);font-weight:700;border-top:2px solid var(--gold)}
.n{text-align:right;font-family:'JetBrains Mono',monospace;font-size:14px;font-variant-numeric:tabular-nums}
.g{color:var(--g)}.r{color:var(--r)}

/* Platform bars */
.plt-area{display:flex;gap:16px;flex:1}
.plt-bars{flex:1.3;display:flex;gap:12px;align-items:flex-end;padding-bottom:10px}
.plt-col{flex:1;display:flex;flex-direction:column;align-items:center;gap:6px}
.plt-bw{width:100%;display:flex;align-items:flex-end;justify-content:center;gap:3px;height:380px}
.plt-b{width:32%;border-radius:6px 6px 0 0;min-height:6px;transition:height 1.2s cubic-bezier(.22,1,.36,1);position:relative;cursor:pointer}
.plt-b.e{background:linear-gradient(180deg,#A855F7,#7C3AED)}.plt-b.v{background:linear-gradient(180deg,#3B82F6,#2563EB)}.plt-b.f{background:linear-gradient(180deg,#10B981,#059669)}
.plt-b:hover{filter:brightness(1.2)}
.plt-tip{position:absolute;bottom:calc(100% + 6px);left:50%;transform:translateX(-50%);background:var(--bg4);border:1px solid var(--w15);border-radius:6px;padding:5px 10px;font-size:11px;white-space:nowrap;color:var(--w);pointer-events:none;opacity:0;transition:opacity .15s;z-index:10;font-family:'JetBrains Mono',monospace}
.plt-b:hover .plt-tip{opacity:1}
.plt-col .pn{font-size:15px;font-weight:600;color:var(--w7)}
.plt-col .pv{font-size:18px;font-weight:700;color:var(--w);margin-top:4px}
.plt-col .pd{font-size:14px;margin-top:2px}
.plt-side{flex:.7;display:flex;flex-direction:column;gap:10px;justify-content:center}
.plt-side .ws{background:var(--bg2);border:1px solid var(--w15);border-radius:12px;padding:18px;text-align:center;transition:border-color .3s}
.plt-side .ws:hover{border-color:var(--gold3)}
.plt-side .ws .wv{font-family:'Space Grotesk',sans-serif;font-size:34px;font-weight:700}
.plt-side .ws .wl{font-size:14px;color:var(--w4);margin-top:4px}
.plt-side .ws .wd{font-size:16px;font-weight:600;margin-top:5px}
.legend{display:flex;gap:24px;justify-content:center;font-size:14px;color:var(--w4);margin-top:8px}
.legend span::before{content:'';display:inline-block;width:10px;height:10px;border-radius:2px;margin-right:6px;vertical-align:middle}
.legend .le::before{background:#A855F7}.legend .lv::before{background:#3B82F6}.legend .lf::before{background:#10B981}

/* Heatmap */
.hm{display:grid;gap:3px;flex:1;align-content:start;font-size:13px}
.hm .hh{background:var(--bg3);padding:12px 6px;text-align:center;font-weight:600;font-size:12px;color:var(--w7);border-radius:6px;text-transform:uppercase;letter-spacing:.5px}
.hm .hb{background:var(--bg2);padding:10px 14px;font-weight:600;font-size:14px;color:var(--w);border-radius:5px}
.hm .hc{display:flex;align-items:center;justify-content:center;border-radius:6px;font-size:20px;font-weight:700;padding:12px 8px;transition:transform .15s;position:relative;cursor:default}
.hm .hc:hover{transform:scale(1.14)}
.hm .hc .hc-tt{position:absolute;bottom:calc(100% + 5px);left:50%;transform:translateX(-50%);background:var(--bg4);border:1px solid var(--w15);border-radius:6px;padding:5px 10px;font-size:11px;white-space:nowrap;color:var(--w);pointer-events:none;opacity:0;transition:opacity .15s;z-index:20;font-family:'DM Sans',sans-serif;font-weight:400;font-size:12px}
.hm .hc:hover .hc-tt{opacity:1}
.hc-g{background:rgba(52,211,153,.1);color:var(--g)}.hc-a{background:rgba(251,191,36,.1);color:var(--a)}
.hc-r{background:rgba(248,113,113,.1);color:var(--r)}.hc-x{background:var(--bg2);color:var(--w15)}

/* ── DEEP DIVE — one directorate per slide ── */
.dd-wrap{display:flex;flex-direction:column;flex:1;gap:12px;overflow:hidden}
.dd-header{display:flex;align-items:center;gap:16px;padding-bottom:12px;border-bottom:1px solid var(--w15)}
.dd-dir-name{font-family:'Space Grotesk',sans-serif;font-size:26px;font-weight:700;color:var(--w);flex:1}
.dd-cards{display:grid;grid-template-columns:1fr 1fr 1fr;gap:16px;flex:1}
.dc{background:var(--bg2);border:1px solid var(--w15);border-radius:16px;padding:28px 32px;display:flex;flex-direction:column;position:relative;overflow:hidden;transition:all .25s;cursor:default}
.dc:hover{transform:translateY(-3px);box-shadow:0 12px 28px rgba(0,0,0,.3)}
.dc::before{content:'';position:absolute;top:0;left:0;right:0;height:4px;border-radius:16px 16px 0 0}
.dc.d1{border-color:rgba(52,211,153,.2)}.dc.d1::before{background:var(--g);box-shadow:0 2px 10px rgba(52,211,153,.4)}
.dc.d2{border-color:rgba(251,191,36,.2)}.dc.d2::before{background:var(--a);box-shadow:0 2px 10px rgba(251,191,36,.3)}
.dc.d3{border-color:rgba(129,140,248,.2)}.dc.d3::before{background:#818CF8;box-shadow:0 2px 10px rgba(129,140,248,.4)}
.dc h4{font-size:11px;text-transform:uppercase;letter-spacing:2.5px;font-weight:700;margin-bottom:16px}
.dc.d1 h4{color:var(--g)}.dc.d2 h4{color:var(--a)}.dc.d3 h4{color:#818CF8}
.dc p{font-size:18px;color:var(--w7);line-height:1.7;flex:1}

/* Headcount freelance gauge */
.hc-gauge-wrap{height:4px;background:var(--w08);border-radius:2px;overflow:hidden;margin-top:4px;width:100%}
.hc-gauge-bar{height:100%;border-radius:2px;transition:width 1s ease}
.hc-gauge-ok{background:var(--g)}.hc-gauge-warn{background:var(--a)}.hc-gauge-over{background:var(--r)}

/* Brand cards grid */
.br-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:14px;flex:1;align-content:start}
.br-card{background:var(--bg2);border:1px solid var(--w15);border-radius:14px;padding:20px 24px;display:flex;flex-direction:column;gap:10px;transition:all .25s;cursor:default;position:relative;overflow:hidden}
.br-card:hover{transform:translateY(-3px);box-shadow:0 10px 28px rgba(0,0,0,.3)}
.br-card::before{content:'';position:absolute;top:0;left:0;right:0;height:3px;border-radius:14px 14px 0 0;background:var(--gold);opacity:.4}
.br-card.br-risk{border-color:rgba(248,113,113,.25)}.br-card.br-risk::before{background:var(--r);opacity:1;animation:pulse-r 2s infinite}
.br-card.br-warn{border-color:rgba(251,191,36,.2)}.br-card.br-warn::before{background:var(--a);opacity:1}
.br-card.br-ok::before{background:var(--g);opacity:1}
.br-name{font-family:'Space Grotesk',sans-serif;font-size:17px;font-weight:700;color:var(--w)}
.br-kpis{display:grid;grid-template-columns:1fr 1fr 1fr;gap:8px}
.br-kpi{background:var(--bg3);border-radius:8px;padding:8px 10px;text-align:center}
.br-kpi-val{font-family:'JetBrains Mono',monospace;font-size:15px;font-weight:600;color:var(--w)}
.br-kpi-lbl{font-size:10px;color:var(--w4);text-transform:uppercase;letter-spacing:.8px;margin-top:2px}
.br-qoq{font-size:12px;font-weight:600}

/* Brand table */
.bt{width:100%;border-collapse:separate;border-spacing:0 4px;font-size:14px}
.bt th{padding:10px 12px;font-size:12px;font-weight:600;text-transform:uppercase;letter-spacing:.8px;color:var(--gold);text-align:center;border-bottom:1px solid var(--w15)}
.bt th:first-child{text-align:left}
.bt td{padding:11px 12px;background:var(--bg2);text-align:center;font-family:'JetBrains Mono',monospace;font-size:13px;transition:background .2s}
.bt td:first-child{text-align:left;font-family:'DM Sans',sans-serif;font-weight:600;font-size:15px;border-radius:8px 0 0 8px}
.bt td:last-child{border-radius:0 8px 8px 0}
.bt tr:hover td{background:var(--bg3)}

/* ── BUDGET SPLIT LAYOUT ── */
.bg-split{display:flex;gap:24px;flex:1;overflow:hidden}
.bg-chart{flex:1.1;display:flex;flex-direction:column;gap:10px;justify-content:center}
.bg-chart-title{font-size:11px;letter-spacing:2px;text-transform:uppercase;color:var(--w4);font-weight:600;margin-bottom:4px}
.bg-dir-row{display:flex;flex-direction:column;gap:4px}
.bg-dir-label{font-size:13px;font-weight:600;color:var(--w7);display:flex;justify-content:space-between}
.bg-dir-label span{font-size:11px;color:var(--w4);font-family:'JetBrains Mono',monospace}
.bg-bar-track{height:20px;background:var(--bg3);border-radius:6px;overflow:hidden;display:flex}
.bg-seg{height:100%;transition:width 1s cubic-bezier(.22,1,.36,1);min-width:2px}
.bg-seg-ask{background:rgba(99,102,241,.35)}
.bg-seg-alloc{background:rgba(59,130,246,.5)}
.bg-seg-spent{background:rgba(236,72,153,.7)}
.bg-seg-rem{background:rgba(52,211,153,.3)}
.bg-legend{display:flex;gap:16px;font-size:11px;color:var(--w4);margin-top:8px}
.bg-legend span::before{content:'';display:inline-block;width:8px;height:8px;border-radius:2px;margin-right:5px;vertical-align:middle}
.bg-l-ask::before{background:rgba(99,102,241,.6)}.bg-l-alloc::before{background:rgba(59,130,246,.7)}
.bg-l-spent::before{background:rgba(236,72,153,.8)}.bg-l-rem::before{background:rgba(52,211,153,.5)}
.bg-table-wrap{flex:.9;display:flex;flex-direction:column;justify-content:center}
.bg-mini{width:100%;border-collapse:separate;border-spacing:0 4px;font-size:13px}

/* ── RISK MATRIX LAYOUT ── */
.rm-layout{display:flex;gap:24px;flex:1;overflow:hidden}

.rm-q-critical{background:rgba(248,113,113,.08);border:1px solid rgba(248,113,113,.2);color:var(--r)}

/* Axis labels */
.rm-axis-y{position:absolute;left:-28px;top:50%;transform:translateY(-50%) rotate(-90deg);font-size:10px;color:var(--w4);letter-spacing:2px;text-transform:uppercase;white-space:nowrap}

.rm-bubble{position:absolute;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:10px;font-weight:700;cursor:pointer;transition:transform .2s,box-shadow .2s;z-index:2}

.rm-bubble.bh{background:rgba(248,113,113,.25);border:2px solid var(--r);color:var(--r);box-shadow:0 0 12px rgba(248,113,113,.4);animation:pulse-r 2s infinite}
.rm-bubble.bm{background:rgba(251,191,36,.2);border:2px solid var(--a);color:var(--a);box-shadow:0 0 10px rgba(251,191,36,.3);animation:pulse-a 2s infinite}
.rm-bubble.bl{background:rgba(52,211,153,.15);border:2px solid var(--g);color:var(--g);box-shadow:0 0 8px rgba(52,211,153,.25)}
.rm-bubble .rm-tt{position:absolute;bottom:calc(100% + 8px);left:50%;transform:translateX(-50%);background:var(--bg4);border:1px solid var(--w15);border-radius:8px;padding:8px 12px;font-size:11px;white-space:nowrap;color:var(--w);pointer-events:none;opacity:0;transition:opacity .2s;z-index:20;font-family:'DM Sans',sans-serif;font-weight:400;min-width:180px;line-height:1.5}

@keyframes pulse-r{0%,100%{box-shadow:0 0 12px rgba(248,113,113,.4)}50%{box-shadow:0 0 22px rgba(248,113,113,.7)}}
@keyframes pulse-a{0%,100%{box-shadow:0 0 10px rgba(251,191,36,.3)}50%{box-shadow:0 0 20px rgba(251,191,36,.6)}}
/* Risk list side */
.rm-list{flex:1;display:flex;flex-direction:column;gap:8px;justify-content:center}

/* ── TIMELINE PRIORITIES (full-height) ── */
.tl-wrap{flex:1;display:flex;flex-direction:column;justify-content:space-between;overflow:hidden;padding:4px 0 8px}

.tl-nodes{display:grid;grid-template-columns:1fr 1fr 1fr;margin-top:-9px}

/* Priority card — large, fills available height */
.pi{background:var(--bg2);border:1px solid var(--w15);border-radius:14px;padding:24px 28px;display:flex;flex-direction:column;gap:12px;transition:all .3s;position:relative;overflow:hidden;cursor:default;height:100%}
.pi:hover{transform:translateY(-4px);box-shadow:0 12px 32px rgba(0,0,0,.35)}
.pi::before{content:'';position:absolute;top:0;left:0;right:0;height:4px;border-radius:14px 14px 0 0}
.pi.pi-people::before{background:#60A5FA;box-shadow:0 2px 10px rgba(59,130,246,.6)}.pi.pi-people{border-color:rgba(59,130,246,.25)}
.pi.pi-budget::before{background:var(--g);box-shadow:0 2px 10px rgba(52,211,153,.5)}.pi.pi-budget{border-color:rgba(52,211,153,.2)}
.pi.pi-product::before{background:#C084FC;box-shadow:0 2px 10px rgba(168,85,247,.5)}.pi.pi-product{border-color:rgba(168,85,247,.2)}

.pi .pc{display:inline-flex;padding:5px 14px;border-radius:6px;font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:1px;align-self:flex-start}

.pc-budget{background:var(--gbg);color:var(--g)}

.pc-editorial{background:var(--abg);color:var(--a)}
.pi .pp{font-size:17px;color:var(--w);line-height:1.5;font-weight:600;flex:1}
.pi .po{font-size:13px;color:var(--w4);padding-top:8px;border-top:1px solid var(--w15)}

/* Decision cards */
.de{background:var(--bg2);border:1px solid var(--w15);border-radius:12px;padding:22px 26px;margin-bottom:12px;display:flex;gap:22px;transition:border-color .3s;flex:1}

.de .dm h4{font-size:18px;font-weight:600;margin-bottom:4px}

.de .dm .cx{font-size:14px;color:var(--w4);line-height:1.55;margin-bottom:12px}

/* Agenda */
.ag{display:grid;grid-template-columns:1fr 1fr;grid-template-rows:repeat(4,1fr);gap:14px;flex:1}
.ai{background:var(--bg2);border:1px solid var(--w15);border-radius:12px;padding:0 26px;display:flex;gap:20px;cursor:pointer;transition:all .3s;align-items:center}
.ai:hover{border-color:var(--gold);background:var(--bg3)}
.ai .an{font-family:'Space Grotesk',sans-serif;font-size:38px;font-weight:700;color:var(--gold);opacity:.35;flex-shrink:0}
.ai h4{font-size:17px;font-weight:600;margin-bottom:4px}
.ai p{font-size:14px;color:var(--w4);line-height:1.4}

/* Stagger */
.stg>*{opacity:0;animation:fu .4s forwards}

/* Commentary bar */
.cmt{margin-top:auto;padding:14px 22px;background:rgba(251,191,36,.06);border:1px solid rgba(251,191,36,.15);border-radius:8px;font-size:15px;color:var(--a);display:flex;align-items:center;gap:10px;line-height:1.5}
.cmt::before{content:'⚠';font-size:16px;flex-shrink:0}
.stg>*:nth-child(1){animation-delay:.05s}.stg>*:nth-child(2){animation-delay:.1s}
.stg>*:nth-child(3){animation-delay:.15s}.stg>*:nth-child(4){animation-delay:.2s}
.stg>*:nth-child(5){animation-delay:.25s}.stg>*:nth-child(6){animation-delay:.3s}
.stg>*:nth-child(7){animation-delay:.35s}.stg>*:nth-child(8){animation-delay:.4s}
.stg>*:nth-child(9){animation-delay:.45s}.stg>*:nth-child(10){animation-delay:.5s}

<body>
<div id="L"><div class="sp"></div><p id="L-msg">Initialising...</p><div id="L-bar-wrap"><div id="L-bar"></div></div></div>
<div id="P"></div>
<div id="D"></div>
<div id="kh"><span><kbd>←</kbd> Previous</span><span><kbd>→</kbd> Next</span><span><kbd>Space</kbd> Advance</span><span><kbd>Home</kbd>/<kbd>End</kbd> Jump</span></div>
<div id="N-wrap">
  <div id="dots"></div>
  <div id="N"><button onclick="go(-1)" id="bp" aria-label="Previous slide">◀</button><span id="N-title"></span><span id="ct">1/1</span><button onclick="go(1)" id="bn" aria-label="Next slide">▶</button></div>
</div>
<script>
const PAT='patMCY7E2UTfb5CSu.eed236ced756b42a7eaa4c7e52ac4d488b8f460d0d7b070b136b527a4916b22c',BASE='applgRsueeUKYfSuT';
const T={reports:'tblIzCoADMiIdvUuV',kpis:'tblkNFuMmUqE2IBnB',dir:'tblDtQwe79ajJuoQO',perf:'tblm5YspKTrOXd14S',hm:'tblshipD98iO83YHM',act:'tblAtlpn6ATjSYKpk'};
async function ft(id){let a=[],o=null;do{const u=`https://api.airtable.com/v0/${BASE}/${id}?pageSize=100${o?'&offset='+o:''}`;const r=await fetch(u,{headers:{Authorization:'Bearer '+PAT}});const d=await r.json();a.push(...(d.records||[]));o=d.offset||null}while(o);return a.map(r=>r.fields).sort((a,b)=>(a['Sort Order']||0)-(b['Sort Order']||0))}

const KC=['#6366F1','#10B981','#9333EA','#3B82F6','#EC4899'];
const PCOL={facebook:'#4A90D9',tiktok:'#E8E8E8',instagram:'#D6628A',youtube:'#E85D5D','x (twitter)':'#5DA8E8'};
function sc(s){if(!s)return'g';const u=s.toUpperCase();return u.includes('OFF')?'r':u.includes('RISK')?'a':'g'}
function dc(d){return!d?'':d.includes('-')?'r':'g'}
function hmc(v){if(!v||v==='—')return'hc-x';return v==='▲'?'hc-g':v==='▬'?'hc-a':v==='▼'?'hc-r':'hc-x'}
function fn(n){return n!=null?Number(n).toLocaleString():'0'}
function fp(n){return n!=null?(n*100).toFixed(1)+'%':'0.0%'}
function pv(v){if(!v)return 0;const n=parseFloat(v.replace(/[^0-9.]/g,''))||0;if(v.includes('B'))return n*1000;if(v.includes('K'))return n/1000;return n}
function ring(pct,col){const r=30,c=2*Math.PI*r,off=c-(pct/100)*c;return`<svg class="ring" viewBox="0 0 72 72"><circle class="rb" cx="36" cy="36" r="${r}"/><circle class="rf" cx="36" cy="36" r="${r}" stroke="${col}" stroke-dasharray="${c}" stroke-dashoffset="${off}"/></svg>`}

function build(D){
const cfg=D.reports[0]||{};const Q=cfg.Report||'Q1 2026',per=cfg.Period||'',cls=cfg.Classification||'Confidential',dt=cfg.Date||'';
const ft=`<div class="ft">Digital Division  ·  Quarterly Executive Report  ·  ${Q}</div>`;
const str='<div class="stripes"><div></div><div></div><div></div><div></div><div></div><div></div><div></div></div>';
function ct(t,b,s){
  SLIDE_TITLES.push(t);
  return`<div class="S S-ct"><div class="hd"><h2>${t}</h2><div class="q">${s||Q}</div></div><div class="hl"></div><div class="bd">${b}</div>${ft}</div>`
}
const SL=[];
const kpis=D.kpis||[],dirs=D.dir||[],perf=D.perf||[],hm=D.hm||[],acts=D.act||[];
const platforms=perf.filter(p=>p.Level==='Platform'),brands=perf.filter(p=>p.Level==='Brand');
const webs=perf.filter(p=>p.Level==='Web'||p.Level==='OTT');
const risks=acts.filter(a=>a.Type==='Risk'),prios=acts.filter(a=>a.Type==='Priority'),decs=acts.filter(a=>a.Type==='Decision');
const dives=dirs.filter(d=>d['Q1 Initiative']);

// 1 COVER
SLIDE_TITLES.push('Cover');
SL.push(`<div class="S S-cover"><canvas id="mesh"></canvas>${str}<div class="cv">
<div class="c1">${cls.toUpperCase()}  ·  FOR EXECUTIVE USE ONLY</div>
<div class="c2">Digital Division</div>
<h1>Quarterly<br>Executive Report</h1>
<div class="c3">${Q}  |  ${per}</div>
<div class="c4">Al Jazeera Media Network</div>
</div><div class="cvf">Date: ${dt}  ·  Classification: ${cls}</div></div>`);

// 2 AGENDA (from Reports table)
// agIdx will be set after all slides are built — use placeholder function
const agItems=[];
for(let i=1;i<=8;i++){const n=String(i).padStart(2,'0');const t=cfg[`Agenda ${n} Title`];const s=cfg[`Agenda ${n} Subtitle`];if(t)agItems.push([n,t,s||''])}
SL.push(ct('Agenda',`<div class="ag stg">${agItems.map((a,i)=>`<div class="ai" data-ag="${i}"><div class="an">${a[0]}</div><div><h4>${a[1]}</h4><p>${a[2]}</p></div></div>`).join('')}</div>`));

// Commentary helper - only shows if text exists
function cmtBox(text){return text?`<div class="cmt">${text}</div>`:''}

// 3 DASHBOARD
// Sparkline direction helper
function sparkDir(sub){if(!sub)return'flat';if(sub.includes('+')||/up|increas/i.test(sub))return'up';if(sub.includes('-')||/down|decreas/i.test(sub))return'down';return'flat';}
function sparkSVG(dir){
  const pts={up:'4,20 12,12 22,15 32,6',down:'4,6 12,14 22,10 32,20',flat:'4,13 12,11 22,15 32,13'};
  const clr=dir==='up'?'var(--g)':dir==='down'?'var(--r)':'var(--w4)';
  const arr=dir==='up'?'▲':dir==='down'?'▼':'—';
  return`<svg width="34" height="22" viewBox="0 0 34 22"><polyline points="${pts[dir]}" fill="none" stroke="${clr}" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/></svg><span style="color:${clr};font-size:11px;font-weight:700">${arr}</span>`;
}
const kpiCards=kpis.map((k,i)=>{
  const num=parseFloat(k.Value)||0;
  const pct=Math.min(num>100?num/5:num>10?num:num*10,100);
  const dir=sparkDir(k.Subtitle);
  return`<div class="kpi" data-raw="${k.Value||''}" data-col="${KC[i]}">${ring(pct,KC[i])}<div class="kv" style="color:${KC[i]}" data-final="${k.Value||'—'}">0</div><div class="kl">${k['KPI Name']||''}</div><div class="kpi-spark">${sparkSVG(dir)}</div></div>`;
}).join('');
// RAG horizontal bar rows
const statItems=dirs.map(d=>{
  const s=sc(d.Status);
  const pulse=(s==='a'||s==='r')?`<div class="rag-pulse"></div>`:'';
  return`<div class="rag-row rag-${s} stg">${pulse}<div class="rag-top"><span class="rag-name">${d.Directorate||''}</span><span class="badge b${s}">${d.Status||'ON TRACK'}</span></div><div class="rag-bar-wrap"><div class="rag-bar"></div></div><div class="rag-comment">${d.Commentary||''}</div></div>`;
}).join('');
SL.push(ct('Executive Dashboard — Quarter at a Glance',`<div class="kpi-strip stg">${kpiCards}</div><div class="sg">${statItems}</div>${cmtBox(cfg['Dashboard Commentary'])}`));

// 4 HEADCOUNT
const tMP=dirs.reduce((s,r)=>s+(r['Total Manpower']||0),0),tFTE=dirs.reduce((s,r)=>s+(r.FTE||0),0),tFL=dirs.reduce((s,r)=>s+(r.Freelance||0),0);
const hcKPI=`<div class="kpi-strip stg">${[['#6366F1',tMP,'Total Manpower'],['#3B82F6',tFTE,'FTEs'],['#10B981',tFL,'Freelancers']].map(k=>`<div class="kpi"><div class="kv" style="color:${k[0]};font-size:44px">${k[1]}</div><div class="kl">${k[2]}</div></div>`).join('')}</div>`;
const hcR=dirs.map(r=>{
  const pctFL=r['Pct Freelance']!=null?Math.round(r['Pct Freelance']*100):0;
  const gCls=pctFL>40?'hc-gauge-over':pctFL>20?'hc-gauge-warn':'hc-gauge-ok';
  return`<tr><td>${r.Directorate}<div class="hc-gauge-wrap"><div class="hc-gauge-bar ${gCls}" style="width:${Math.min(pctFL,100)}%"></div></div></td><td class="n">${fn(r['Total Manpower'])}</td><td class="n">${fn(r.FTE)}</td><td class="n">${fn(r.Freelance)}</td><td class="n ${pctFL>40?'r':pctFL>20?'':'g'}">${pctFL}%</td><td class="n ${dc(String(r['HC QoQ Change']||0))}">${fp(r['HC QoQ Change'])}</td></tr>`;
}).join('');
SL.push(ct('People & Headcount Overview',`${hcKPI}<table class="tb"><thead><tr><th>Directorate</th><th>Total</th><th>FTE</th><th>Freelance</th><th>% Freelance</th><th>QoQ Δ</th></tr></thead><tbody class="stg">${hcR}<tr class="tot"><td>Network Total</td><td class="n">${fn(tMP)}</td><td class="n">${fn(tFTE)}</td><td class="n">${fn(tFL)}</td><td class="n">${fp(tFL/tMP)}</td><td></td></tr></tbody></table>${cmtBox(cfg['Headcount Commentary'])}`));

// 5 BUDGET — Split Layout: Stacked bars left + compact table right
const tA=dirs.reduce((s,r)=>s+(r['The Ask']||0),0),tAl=dirs.reduce((s,r)=>s+(r.Allocated||0),0),tBD=dirs.reduce((s,r)=>s+(r['Budget to Date']||0),0),tS=dirs.reduce((s,r)=>s+(r['Spend YTD']||0),0),tR=dirs.reduce((s,r)=>s+(r.Remaining||0),0);
const bgKPI=`<div class="kpi-strip stg">${[['#6366F1',(tA/1000).toFixed(1)+'M','The Ask'],['#3B82F6',(tAl/1000).toFixed(1)+'M','Allocated'],['#EC4899',(tS/1000).toFixed(1)+'M','Spend YTD'],['#10B981',(tR/1000).toFixed(1)+'M','Remaining']].map(k=>`<div class="kpi"><div class="kv" style="color:${k[0]};font-size:32px" data-final="${k[1]}">${k[1]}</div><div class="kl">${k[2]}</div></div>`).join('')}</div>`;
// Stacked bars: max = The Ask (100%)
const bgMaxAsk=Math.max(...dirs.map(r=>r['The Ask']||0))||1;
const bgBars=dirs.map(r=>{
  const ask=r['The Ask']||0,alloc=r.Allocated||0,spent=r['Spend YTD']||0,rem=r.Remaining||0;

// Mesh
function mesh(id){const c=document.getElementById(id);if(!c)return;const x=c.getContext('2d');c.width=1440;c.height=810;
const p=[];for(let i=0;i<55;i++)p.push({x:Math.random()*1440,y:Math.random()*810,vx:(Math.random()-.5)*.3,vy:(Math.random()-.5)*.3});
(function d(){x.clearRect(0,0,1440,810);p.forEach(q=>{q.x+=q.vx;q.y+=q.vy;if(q.x<0||q.x>1440)q.vx*=-1;if(q.y<0||q.y>810)q.vy*=-1;x.beginPath();x.arc(q.x,q.y,1.5,0,Math.PI*2);x.fillStyle='rgba(212,168,75,.2)';x.fill()});
for(let i=0;i<p.length;i++)for(let j=i+1;j<p.length;j++){const dx=p[i].x-p[j].x,dy=p[i].y-p[j].y,dist=Math.sqrt(dx*dx+dy*dy);if(dist<150){x.beginPath();x.moveTo(p[i].x,p[i].y);x.lineTo(p[j].x,p[j].y);x.strokeStyle=`rgba(212,168,75,${.05*(1-dist/150)})`;x.stroke()}}requestAnimationFrame(d)})()}

// KPI counter animation
function animKPIs(){
  document.querySelectorAll('.kpi .kv[data-final]').forEach(el=>{
    const final=el.dataset.final;
    const num=parseFloat(final.replace(/[^0-9.]/g,''));
    if(!num||isNaN(num)){el.textContent=final;return;}
    const suffix=final.replace(/[0-9.,]/g,'').trim();
    const prefix='';
    let start=0,dur=1400,t0=null;
    function step(t){
      if(!t0)t0=t;
      const prog=Math.min((t-t0)/dur,1);
      const ease=1-(1-prog)**3;
      const cur=start+num*ease;
      el.textContent=prefix+(Number.isInteger(num)?Math.round(cur).toLocaleString():cur.toFixed(1))+(suffix?' '+suffix:'');
      if(prog<1)requestAnimationFrame(step);else el.textContent=final;
    }
    requestAnimationFrame(step);
  });
}

// Table: highlight max numeric value per column
function highlightTables(){
  document.querySelectorAll('.tb,.bt').forEach(t=>{
    const rows=[...t.querySelectorAll('tbody tr:not(.tot)')];
    if(!rows.length)return;
    const cols=rows[0].cells.length;
    for(let c=1;c<cols;c++){
      const cells=rows.map(r=>r.cells[c]).filter(Boolean);
      const vals=cells.map(c=>parseFloat(c.textContent.replace(/[^0-9.]/g,''))||0);
      const max=Math.max(...vals);
      if(max>0)cells.forEach((cell,i)=>{if(vals[i]===max)cell.classList.add('num-hi');else cell.classList.remove('num-hi');});
    }
  });
}

/* ── SLIDE TITLES (for nav) ── */
const SLIDE_TITLES=[];

let cur=0,tot=0,isAnimating=false;

function go(d){
  if(isAnimating)return;
  const s=document.querySelectorAll('.S');
  const next=Math.max(0,Math.min(tot-1,cur+d));
  if(next===cur)return;
  isAnimating=true;
  const old=cur;
  const outClass=d>0?'out-left':'out-right';
  s[old].classList.remove('on');
  s[old].classList.add(outClass);
  setTimeout(()=>{s[old].classList.remove(outClass);},320);
  s[next].style.transform=d>0?'translateX(60px)':'translateX(-60px)';
  s[next].style.opacity='0';
  requestAnimationFrame(()=>{
    s[next].classList.add('on');
    s[next].style.transform='';
    s[next].style.opacity='';
  });
  cur=next;
  setTimeout(()=>isAnimating=false,440);
  upd();post();
}

function goTo(i){
  if(isAnimating||i===cur)return;
  go(i-cur>0?1:-1);
  // For multi-step jumps call recursively
  if(Math.abs(i-cur)>1){setTimeout(()=>goTo(i),50);}
}

function goToExact(i){
  if(isAnimating)return;
  const s=document.querySelectorAll('.S');
  const d=i-cur;
  if(d===0)return;
  isAnimating=true;
  const old=cur;
  const outClass=d>0?'out-left':'out-right';
  s[old].classList.remove('on');
  s[old].classList.add(outClass);
  setTimeout(()=>{s[old].classList.remove(outClass);},320);
  s[i].style.transform=d>0?'translateX(60px)':'translateX(-60px)';
  s[i].style.opacity='0';
  requestAnimationFrame(()=>{s[i].classList.add('on');s[i].style.transform='';s[i].style.opacity='';});
  cur=i;
  setTimeout(()=>isAnimating=false,440);
  upd();post();
}

function post(){
  if(cur===0)mesh('mesh');
  if(cur===tot-1)mesh('mesh2');
  setTimeout(animBars,100);
  setTimeout(animKPIs,200);
  setTimeout(highlightTables,300);
}

document.addEventListener('keydown',e=>{
  if(e.key==='ArrowRight'||e.key===' '){e.preventDefault();go(1)}
  if(e.key==='ArrowLeft'){e.preventDefault();go(-1)}
  if(e.key==='Home'){e.preventDefault();goToExact(0)}
  if(e.key==='End'){e.preventDefault();goToExact(tot-1)}
});

// Keyboard hint: auto-hide after 4s
setTimeout(()=>{const kh=document.getElementById('kh');if(kh)kh.classList.add('fade')},4000);

// Progress loading
function setLoader(msg,pct){
  const m=document.getElementById('L-msg'),b=document.getElementById('L-bar');
  if(m)m.textContent=msg;
  if(b)b.style.width=pct+'%';
}

(async()=>{try{
  setLoader('Fetching reports...',15);
  const keys=Object.keys(T);
  const labels=['reports','KPIs','directorates','performance','heatmap','actions'];
  const D={};
  for(let i=0;i<keys.length;i++){
    setLoader(`Loading ${labels[i]}...`,15+Math.round((i+1)/keys.length*80));
    D[keys[i]]=await ft(Object.values(T)[i]);
  }
  setLoader('Building slides...',98);
  const slides=build(D);tot=slides.length;
  document.getElementById('D').innerHTML=slides.join('');
  document.querySelectorAll('.S')[0].classList.add('on');
  buildDots();
  // Wire agenda items to correct slide indices dynamically
  const agSearch=['Executive Dashboard','People & Headcount','Budget Overview','Digital Platform','Heatmap','Deep Dive','Digital Brands','Risks'];
  document.querySelectorAll('.ai[data-ag]').forEach(el=>{
    const idx=parseInt(el.dataset.ag);
    const kw=agSearch[idx]||'';
    let target=idx+2;
    for(let s=0;s<SLIDE_TITLES.length;s++){
      if(SLIDE_TITLES[s]&&SLIDE_TITLES[s].includes(kw)){target=s;break;}
    }
    el.onclick=()=>goToExact(target);
  });
  upd();mesh('mesh');
  setLoader('Ready',100);
  setTimeout(()=>document.getElementById('L').classList.add('done'),500);
}catch(e){document.querySelector('#L-msg').textContent='Error: '+e.message;console.error(e)}})();
</script>
</body>
