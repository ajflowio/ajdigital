<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Digital Division — Executive Report</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;400;500;600;700&family=DM+Sans:opsz,wght@9..40,300;9..40,400;9..40,500;9..40,600;9..40,700&family=JetBrains+Mono:wght@400;500&display=swap');
:root{
--bg:#0B0E1A;--bg2:#131729;--bg3:#1A1F36;--bg4:#222842;
--gold:#D4A84B;--gold2:#E8C36A;--gold3:rgba(212,168,75,.15);
--w:#EEEEF0;--w7:rgba(238,238,240,.7);--w4:rgba(238,238,240,.4);--w15:rgba(238,238,240,.12);--w08:rgba(238,238,240,.06);
--g:#34D399;--gbg:rgba(52,211,153,.12);--gd:#15803D;
--a:#FBBF24;--abg:rgba(251,191,36,.12);
--r:#F87171;--rbg:rgba(248,113,113,.12);
}
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:'DM Sans',sans-serif;background:var(--bg);color:var(--w);overflow:hidden;height:100vh}

/* Loader */
#L{position:fixed;inset:0;z-index:999;background:var(--bg);display:flex;flex-direction:column;align-items:center;justify-content:center;gap:20px;transition:opacity .6s}
#L.done{opacity:0;pointer-events:none}
#L .sp{width:42px;height:42px;border:2px solid var(--bg3);border-top-color:var(--gold);border-radius:50%;animation:spin .7s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}
#L p{color:var(--gold);font-size:11px;letter-spacing:4px;text-transform:uppercase}

/* Deck */
#D{width:1440px;height:810px;position:relative;margin:auto;top:50%;transform:translateY(-50%)}
.S{position:absolute;inset:0;opacity:0;pointer-events:none;transition:opacity .45s}.S.on{opacity:1;pointer-events:all}

/* Nav */
#N{position:fixed;bottom:18px;left:50%;transform:translateX(-50%);display:flex;align-items:center;gap:14px;background:rgba(11,14,26,.9);backdrop-filter:blur(14px);padding:8px 22px;border-radius:28px;border:1px solid var(--w15);z-index:100}
#N button{background:none;border:none;color:var(--gold);cursor:pointer;font-size:16px;padding:4px 10px;border-radius:6px;transition:background .2s}
#N button:hover{background:var(--gold3)}
#N button:disabled{opacity:.2}
#N span{color:var(--w4);font-size:13px;font-family:'JetBrains Mono',monospace;min-width:60px;text-align:center}
#P{position:fixed;top:0;left:0;height:2px;background:var(--gold);transition:width .3s;z-index:100}

/* ── COVER ── */
.S-cover{background:var(--bg);position:relative;overflow:hidden;display:flex;align-items:center;padding:0 100px}
.S-cover canvas{position:absolute;inset:0}
.cv{position:relative;z-index:1}
.cv .c1{font-size:12px;letter-spacing:4px;text-transform:uppercase;color:var(--gold);font-weight:500;opacity:0;animation:fu .6s .3s forwards}
.cv .c2{font-size:18px;color:var(--w4);margin-top:20px;font-weight:300;opacity:0;animation:fu .6s .5s forwards}
.cv h1{font-family:'Space Grotesk',sans-serif;font-size:66px;font-weight:700;line-height:1.05;margin:14px 0;max-width:720px;opacity:0;animation:fu .8s .7s forwards}
.cv .c3{color:var(--gold2);font-size:20px;font-weight:400;margin-top:10px;opacity:0;animation:fu .6s 1s forwards}
.cv .c4{color:var(--w4);font-size:16px;margin-top:36px;padding-top:18px;border-top:2px solid var(--gold);display:inline-block;opacity:0;animation:fu .6s 1.2s forwards}
.cvf{position:absolute;bottom:28px;left:100px;color:var(--w15);font-size:12px;z-index:1}
.stripes{position:absolute;right:0;top:0;bottom:0;width:260px;display:flex;gap:14px;padding:0 24px;align-items:stretch}
.stripes div{flex:1;border-radius:3px}
.stripes div:nth-child(odd){background:rgba(212,168,75,.3)}
.stripes div:nth-child(even){background:rgba(255,255,255,.04)}
@keyframes fu{from{opacity:0;transform:translateY(18px)}to{opacity:1;transform:translateY(0)}}

/* ── CONTENT SLIDE ── */
.S-ct{background:var(--bg);display:flex;flex-direction:column}
.S-ct .hd{padding:28px 64px 0;display:flex;justify-content:space-between;align-items:baseline}
.S-ct .hd h2{font-family:'Space Grotesk',sans-serif;font-size:32px;font-weight:600}
.S-ct .hd .q{color:var(--gold);font-size:14px;font-weight:500}
.S-ct .hl{margin:14px 64px 0;height:1px;background:linear-gradient(90deg,var(--gold),transparent 50%)}
.S-ct .bd{flex:1;padding:22px 64px 0;display:flex;flex-direction:column;overflow:hidden}
.S-ct .ft{padding:10px 64px;color:var(--w15);font-size:11px}

/* ── COMPONENTS ── */

/* KPI strip */
.kpi-strip{display:flex;gap:16px;margin-bottom:18px}
.kpi{flex:1;background:var(--bg2);border:1px solid var(--w15);border-radius:14px;padding:20px;text-align:center;transition:border-color .3s}
.kpi:hover{border-color:var(--gold3)}
.kpi .kv{font-family:'Space Grotesk',sans-serif;font-size:40px;font-weight:700;line-height:1}
.kpi .kl{font-size:14px;color:var(--w7);margin-top:6px;font-weight:500}
.kpi .ks{font-size:13px;color:var(--w4);margin-top:2px}
.kpi .ring{width:72px;height:72px;margin:0 auto 10px;transform:rotate(-90deg)}
.kpi .ring circle{fill:none;stroke-width:4;stroke-linecap:round}
.kpi .ring .rb{stroke:var(--w08)}
.kpi .ring .rf{transition:stroke-dashoffset 1.5s ease}

/* Status grid */
.sg{display:grid;grid-template-columns:1fr 1fr;gap:10px;flex:1;align-content:center}
.si{display:flex;align-items:center;gap:14px;padding:16px 20px;background:var(--bg2);border:1px solid var(--w15);border-radius:10px;transition:border-color .3s}
.si:hover{border-color:rgba(212,168,75,.18)}
.dot{width:9px;height:9px;border-radius:50%;flex-shrink:0;box-shadow:0 0 8px currentColor}
.dot-g{background:var(--g);color:var(--g)}.dot-a{background:var(--a);color:var(--a)}.dot-r{background:var(--r);color:var(--r)}
.badge{padding:4px 12px;border-radius:5px;font-size:11px;font-weight:600;letter-spacing:.5px;text-transform:uppercase}
.bg{background:var(--gbg);color:var(--g)}.ba{background:var(--abg);color:var(--a)}.br{background:var(--rbg);color:var(--r)}
.si .nm{font-weight:600;font-size:15px}.si .cm{font-size:13px;color:var(--w4);margin-top:2px}

/* Tables */
.tb{width:100%;border-collapse:separate;border-spacing:0 4px;font-size:14px;flex:1}
.tb th{padding:10px 14px;font-size:12px;font-weight:600;text-transform:uppercase;letter-spacing:.8px;color:var(--gold);text-align:left;border-bottom:1px solid var(--w15)}
.tb td{padding:12px 14px;background:var(--bg2);transition:background .2s}
.tb td:first-child{border-radius:8px 0 0 8px}
.tb td:last-child{border-radius:0 8px 8px 0}
.tb tr:hover td{background:var(--bg3)}
.tb .tot td{background:var(--bg3);font-weight:700;border-top:2px solid var(--gold)}
.n{text-align:right;font-family:'JetBrains Mono',monospace;font-size:14px;font-variant-numeric:tabular-nums}
.g{color:var(--g)}.r{color:var(--r)}

/* Platform bars */
.plt-area{display:flex;gap:16px;flex:1}
.plt-bars{flex:1.3;display:flex;gap:12px;align-items:flex-end;padding-bottom:10px}
.plt-col{flex:1;display:flex;flex-direction:column;align-items:center;gap:6px}
.plt-bw{width:100%;display:flex;align-items:flex-end;justify-content:center;gap:3px;height:380px}
.plt-b{width:32%;border-radius:6px 6px 0 0;min-height:6px;transition:height 1.2s cubic-bezier(.22,1,.36,1)}
.plt-b.e{background:linear-gradient(180deg,#A855F7,#7C3AED)}.plt-b.v{background:linear-gradient(180deg,#3B82F6,#2563EB)}.plt-b.f{background:linear-gradient(180deg,#10B981,#059669)}
.plt-col .pn{font-size:15px;font-weight:600;color:var(--w7)}
.plt-col .pv{font-size:18px;font-weight:700;color:var(--w);margin-top:4px}
.plt-col .pd{font-size:14px;margin-top:2px}
.plt-side{flex:.7;display:flex;flex-direction:column;gap:10px;justify-content:center}
.plt-side .ws{background:var(--bg2);border:1px solid var(--w15);border-radius:12px;padding:18px;text-align:center;transition:border-color .3s}
.plt-side .ws:hover{border-color:var(--gold3)}
.plt-side .ws .wv{font-family:'Space Grotesk',sans-serif;font-size:34px;font-weight:700}
.plt-side .ws .wl{font-size:14px;color:var(--w4);margin-top:4px}
.plt-side .ws .wd{font-size:16px;font-weight:600;margin-top:5px}
.legend{display:flex;gap:24px;justify-content:center;font-size:14px;color:var(--w4);margin-top:8px}
.legend span::before{content:'';display:inline-block;width:10px;height:10px;border-radius:2px;margin-right:6px;vertical-align:middle}
.legend .le::before{background:#A855F7}.legend .lv::before{background:#3B82F6}.legend .lf::before{background:#10B981}

/* Heatmap */
.hm{display:grid;gap:3px;flex:1;align-content:start;font-size:13px}
.hm .hh{background:var(--bg3);padding:10px 6px;text-align:center;font-weight:600;font-size:12px;color:var(--w7);border-radius:5px;text-transform:uppercase;letter-spacing:.5px}
.hm .hb{background:var(--bg2);padding:10px 14px;font-weight:600;font-size:14px;color:var(--w);border-radius:5px}
.hm .hc{display:flex;align-items:center;justify-content:center;border-radius:5px;font-size:16px;font-weight:700;padding:8px;transition:transform .15s}
.hm .hc:hover{transform:scale(1.12)}
.hc-g{background:rgba(52,211,153,.1);color:var(--g)}.hc-a{background:rgba(251,191,36,.1);color:var(--a)}
.hc-r{background:rgba(248,113,113,.1);color:var(--r)}.hc-x{background:var(--bg2);color:var(--w15)}

/* Deep dive — 2 per slide */
.dd2{display:grid;grid-template-columns:140px 1fr 1fr 1fr;grid-template-rows:1fr 1fr;gap:14px;flex:1;align-content:center}
.dd2-label{display:flex;align-items:center;font-family:'Space Grotesk',sans-serif;font-size:16px;font-weight:600;color:var(--gold);line-height:1.3;padding-right:8px}
.dc{background:var(--bg2);border:1px solid var(--w15);border-radius:14px;padding:24px 26px;display:flex;flex-direction:column;position:relative;overflow:hidden}
.dc::before{content:'';position:absolute;top:0;left:0;right:0;height:4px;border-radius:14px 14px 0 0}
.dc.d1::before{background:var(--g)}.dc.d2::before{background:var(--a)}.dc.d3::before{background:#818CF8}
.dc h4{font-size:12px;text-transform:uppercase;letter-spacing:2px;font-weight:600;margin-bottom:12px}
.dc.d1 h4{color:var(--g)}.dc.d2 h4{color:var(--a)}.dc.d3 h4{color:#818CF8}
.dc p{font-size:16px;color:var(--w7);line-height:1.65;flex:1}

/* Brand table */
.bt{width:100%;border-collapse:separate;border-spacing:0 4px;font-size:14px}
.bt th{padding:10px 12px;font-size:12px;font-weight:600;text-transform:uppercase;letter-spacing:.8px;color:var(--gold);text-align:center;border-bottom:1px solid var(--w15)}
.bt th:first-child{text-align:left}
.bt td{padding:11px 12px;background:var(--bg2);text-align:center;font-family:'JetBrains Mono',monospace;font-size:13px;transition:background .2s}
.bt td:first-child{text-align:left;font-family:'DM Sans',sans-serif;font-weight:600;font-size:15px;border-radius:8px 0 0 8px}
.bt td:last-child{border-radius:0 8px 8px 0}
.bt tr:hover td{background:var(--bg3)}

/* Risk cards */
.rk{background:var(--bg2);border:1px solid var(--w15);border-radius:10px;padding:16px 20px;margin-bottom:8px;display:flex;gap:16px;align-items:flex-start;transition:border-color .3s}
.rk:hover{border-color:rgba(212,168,75,.15)}
.rk .rv{width:4px;min-height:40px;border-radius:2px;flex-shrink:0;margin-top:2px}
.rv-h{background:var(--r)}.rv-m{background:var(--a)}.rv-l{background:var(--g)}
.rk h5{font-size:16px;font-weight:500;margin-bottom:4px}
.rk .rm{font-size:13px;color:var(--w4);display:flex;gap:14px;flex-wrap:wrap}
.rk .rt{font-size:13px;color:var(--w4);margin-top:6px;font-style:italic;opacity:.7}

/* Priorities */
.pl{display:grid;grid-template-columns:1fr 1fr;gap:12px;flex:1;align-content:center}
.pi{padding:18px 20px;background:var(--bg2);border:1px solid var(--w15);border-radius:10px;display:flex;gap:14px;align-items:flex-start;transition:border-color .3s}
.pi:hover{border-color:rgba(212,168,75,.15)}
.pi .pc{padding:5px 12px;border-radius:5px;font-size:11px;font-weight:600;text-transform:uppercase;letter-spacing:.5px;white-space:nowrap;flex-shrink:0}
.pc-people{background:rgba(59,130,246,.12);color:#60A5FA}.pc-budget{background:var(--gbg);color:var(--g)}
.pc-product{background:rgba(168,85,247,.12);color:#C084FC}.pc-editorial{background:var(--abg);color:var(--a)}
.pi .pp{font-size:16px;color:var(--w7);line-height:1.45}
.pi .po{font-size:12px;color:var(--w4);margin-top:4px}

/* Decision cards */
.de{background:var(--bg2);border:1px solid var(--w15);border-radius:12px;padding:22px 26px;margin-bottom:12px;display:flex;gap:22px;transition:border-color .3s;flex:1}
.de:hover{border-color:rgba(212,168,75,.18)}
.de .dn{font-family:'Space Grotesk',sans-serif;font-size:36px;font-weight:700;color:var(--gold);opacity:.25;flex-shrink:0;width:50px}
.de .dm{flex:1}
.de .dm h4{font-size:18px;font-weight:600;margin-bottom:4px}
.de .dm .ow{font-size:14px;color:var(--gold);font-weight:500;margin-bottom:8px}
.de .dm .cx{font-size:14px;color:var(--w4);line-height:1.55;margin-bottom:12px}
.de .dm .opts{display:flex;gap:8px;flex-wrap:wrap}
.de .dm .opt{padding:7px 16px;border-radius:7px;font-size:13px;background:var(--bg3);color:var(--w7);border:1px solid var(--w15)}
.de .dm .opt:first-child{border-color:rgba(129,140,248,.3);color:#A5B4FC}

/* Agenda */
.ag{display:grid;grid-template-columns:1fr 1fr;grid-template-rows:repeat(4,1fr);gap:14px;flex:1}
.ai{background:var(--bg2);border:1px solid var(--w15);border-radius:12px;padding:0 26px;display:flex;gap:20px;cursor:pointer;transition:all .3s;align-items:center}
.ai:hover{border-color:var(--gold);background:var(--bg3)}
.ai .an{font-family:'Space Grotesk',sans-serif;font-size:38px;font-weight:700;color:var(--gold);opacity:.35;flex-shrink:0}
.ai h4{font-size:17px;font-weight:600;margin-bottom:4px}
.ai p{font-size:14px;color:var(--w4);line-height:1.4}

/* Stagger */
.stg>*{opacity:0;animation:fu .4s forwards}

/* Commentary bar */
.cmt{margin-top:auto;padding:12px 20px;background:rgba(251,191,36,.06);border:1px solid rgba(251,191,36,.15);border-radius:8px;font-size:14px;color:var(--a);display:flex;align-items:center;gap:10px;line-height:1.5}
.cmt::before{content:'⚠';font-size:16px;flex-shrink:0}
.stg>*:nth-child(1){animation-delay:.05s}.stg>*:nth-child(2){animation-delay:.1s}
.stg>*:nth-child(3){animation-delay:.15s}.stg>*:nth-child(4){animation-delay:.2s}
.stg>*:nth-child(5){animation-delay:.25s}.stg>*:nth-child(6){animation-delay:.3s}
.stg>*:nth-child(7){animation-delay:.35s}.stg>*:nth-child(8){animation-delay:.4s}
.stg>*:nth-child(9){animation-delay:.45s}.stg>*:nth-child(10){animation-delay:.5s}
.stg>*:nth-child(11){animation-delay:.55s}.stg>*:nth-child(12){animation-delay:.6s}

@media(max-width:1460px){#D{transform:translateY(-50%) scale(0.68);transform-origin:center center}}
@media(max-width:1000px){#D{transform:translateY(-50%) scale(0.48);transform-origin:center center}}
</style>
</head>
<body>
<div id="L"><div class="sp"></div><p>Loading data...</p></div>
<div id="P"></div>
<div id="D"></div>
<div id="N"><button onclick="go(-1)" id="bp">◀</button><span id="ct">1/1</span><button onclick="go(1)" id="bn">▶</button></div>
<script>
const PAT='patMCY7E2UTfb5CSu.eed236ced756b42a7eaa4c7e52ac4d488b8f460d0d7b070b136b527a4916b22c',BASE='applgRsueeUKYfSuT';
const T={reports:'tblIzCoADMiIdvUuV',kpis:'tblkNFuMmUqE2IBnB',dir:'tblDtQwe79ajJuoQO',perf:'tblm5YspKTrOXd14S',hm:'tblshipD98iO83YHM',act:'tblAtlpn6ATjSYKpk'};
async function ft(id){let a=[],o=null;do{const u=`https://api.airtable.com/v0/${BASE}/${id}?pageSize=100${o?'&offset='+o:''}`;const r=await fetch(u,{headers:{Authorization:'Bearer '+PAT}});const d=await r.json();a.push(...(d.records||[]));o=d.offset||null}while(o);return a.map(r=>r.fields).sort((a,b)=>(a['Sort Order']||0)-(b['Sort Order']||0))}

const KC=['#6366F1','#10B981','#9333EA','#3B82F6','#EC4899'];
const PCOL={facebook:'#4A90D9',tiktok:'#E8E8E8',instagram:'#D6628A',youtube:'#E85D5D','x (twitter)':'#5DA8E8'};
function sc(s){if(!s)return'g';const u=s.toUpperCase();return u.includes('OFF')?'r':u.includes('RISK')?'a':'g'}
function dc(d){return!d?'':d.includes('-')?'r':'g'}
function hmc(v){if(!v||v==='—')return'hc-x';return v==='▲'?'hc-g':v==='▬'?'hc-a':v==='▼'?'hc-r':'hc-x'}
function fn(n){return n!=null?Number(n).toLocaleString():'0'}
function fp(n){return n!=null?(n*100).toFixed(1)+'%':'0.0%'}
function pv(v){if(!v)return 0;const n=parseFloat(v.replace(/[^0-9.]/g,''))||0;if(v.includes('B'))return n*1000;if(v.includes('K'))return n/1000;return n}
function ring(pct,col){const r=30,c=2*Math.PI*r,off=c-(pct/100)*c;return`<svg class="ring" viewBox="0 0 72 72"><circle class="rb" cx="36" cy="36" r="${r}"/><circle class="rf" cx="36" cy="36" r="${r}" stroke="${col}" stroke-dasharray="${c}" stroke-dashoffset="${off}"/></svg>`}

function build(D){
const cfg=D.reports[0]||{};const Q=cfg.Report||'Q1 2026',per=cfg.Period||'',cls=cfg.Classification||'Confidential',dt=cfg.Date||'';
const ft=`<div class="ft">Digital Division  ·  Quarterly Executive Report  ·  ${Q}</div>`;
const str='<div class="stripes"><div></div><div></div><div></div><div></div><div></div><div></div><div></div></div>';
function ct(t,b,s){return`<div class="S S-ct"><div class="hd"><h2>${t}</h2><div class="q">${s||Q}</div></div><div class="hl"></div><div class="bd">${b}</div>${ft}</div>`}
const SL=[];
const kpis=D.kpis||[],dirs=D.dir||[],perf=D.perf||[],hm=D.hm||[],acts=D.act||[];
const platforms=perf.filter(p=>p.Level==='Platform'),brands=perf.filter(p=>p.Level==='Brand');
const webs=perf.filter(p=>p.Level==='Web'||p.Level==='OTT');
const risks=acts.filter(a=>a.Type==='Risk'),prios=acts.filter(a=>a.Type==='Priority'),decs=acts.filter(a=>a.Type==='Decision');
const dives=dirs.filter(d=>d['Q1 Initiative']);

// 1 COVER
SL.push(`<div class="S S-cover"><canvas id="mesh"></canvas>${str}<div class="cv">
<div class="c1">${cls.toUpperCase()}  ·  FOR EXECUTIVE USE ONLY</div>
<div class="c2">Digital Division</div>
<h1>Quarterly<br>Executive Report</h1>
<div class="c3">${Q}  |  ${per}</div>
<div class="c4">Al Jazeera Media Network</div>
</div><div class="cvf">Date: ${dt}  ·  Classification: ${cls}</div></div>`);

// 2 AGENDA (from Reports table)
const agIdx=[2,3,4,5,6,7,9,10];
const agItems=[];
for(let i=1;i<=8;i++){const n=String(i).padStart(2,'0');const t=cfg[`Agenda ${n} Title`];const s=cfg[`Agenda ${n} Subtitle`];if(t)agItems.push([n,t,s||''])}
SL.push(ct('Agenda',`<div class="ag stg">${agItems.map((a,i)=>`<div class="ai" onclick="goTo(${agIdx[i]||i+2})"><div class="an">${a[0]}</div><div><h4>${a[1]}</h4><p>${a[2]}</p></div></div>`).join('')}</div>`));

// Commentary helper - only shows if text exists
function cmtBox(text){return text?`<div class="cmt">${text}</div>`:''}

// 3 DASHBOARD
const kpiCards=kpis.map((k,i)=>{const num=parseFloat(k.Value)||0;const pct=Math.min(num>100?num/5:num>10?num:num*10,100);return`<div class="kpi">${ring(pct,KC[i])}<div class="kv" style="color:${KC[i]}">${k.Value||'—'}</div><div class="kl">${k['KPI Name']||''}</div><div class="ks">${k.Subtitle||''}</div></div>`}).join('');
const statItems=dirs.map(d=>{const s=sc(d.Status);return`<div class="si"><div class="dot dot-${s}"></div><div class="badge b${s}">${d.Status||'ON TRACK'}</div><div><div class="nm">${d.Directorate||''}</div><div class="cm">${d.Commentary||''}</div></div></div>`}).join('');
SL.push(ct('Executive Dashboard — Quarter at a Glance',`<div class="kpi-strip stg">${kpiCards}</div><div class="sg stg">${statItems}</div>${cmtBox(cfg['Dashboard Commentary'])}`));

// 4 HEADCOUNT
const tMP=dirs.reduce((s,r)=>s+(r['Total Manpower']||0),0),tFTE=dirs.reduce((s,r)=>s+(r.FTE||0),0),tFL=dirs.reduce((s,r)=>s+(r.Freelance||0),0);
const hcKPI=`<div class="kpi-strip stg">${[['#6366F1',tMP,'Total Manpower'],['#3B82F6',tFTE,'FTEs'],['#10B981',tFL,'Freelancers']].map(k=>`<div class="kpi"><div class="kv" style="color:${k[0]};font-size:44px">${k[1]}</div><div class="kl">${k[2]}</div></div>`).join('')}</div>`;
const hcR=dirs.map(r=>`<tr><td>${r.Directorate}</td><td class="n">${fn(r['Total Manpower'])}</td><td class="n">${fn(r.FTE)}</td><td class="n">${fn(r.Freelance)}</td><td class="n">${fp(r['Pct Freelance'])}</td><td class="n ${dc(String(r['HC QoQ Change']||0))}">${fp(r['HC QoQ Change'])}</td></tr>`).join('');
SL.push(ct('People & Headcount Overview',`${hcKPI}<table class="tb"><thead><tr><th>Directorate</th><th>Total</th><th>FTE</th><th>Freelance</th><th>% Freelance</th><th>QoQ Δ</th></tr></thead><tbody class="stg">${hcR}<tr class="tot"><td>Network Total</td><td class="n">${fn(tMP)}</td><td class="n">${fn(tFTE)}</td><td class="n">${fn(tFL)}</td><td class="n">${fp(tFL/tMP)}</td><td></td></tr></tbody></table>${cmtBox(cfg['Headcount Commentary'])}`));

// 5 BUDGET
const tA=dirs.reduce((s,r)=>s+(r['The Ask']||0),0),tAl=dirs.reduce((s,r)=>s+(r.Allocated||0),0),tBD=dirs.reduce((s,r)=>s+(r['Budget to Date']||0),0),tS=dirs.reduce((s,r)=>s+(r['Spend YTD']||0),0),tR=dirs.reduce((s,r)=>s+(r.Remaining||0),0);
const bgKPI=`<div class="kpi-strip stg">${[['#6366F1',(tA/1000).toFixed(1)+'M','The Ask'],['#3B82F6',(tAl/1000).toFixed(1)+'M','Allocated'],['#10B981',(tBD/1000).toFixed(1)+'M','Budget to Date'],['#9333EA',(tS/1000).toFixed(1)+'M','Spend YTD'],['#EC4899',(tR/1000).toFixed(1)+'M','Remaining']].map(k=>`<div class="kpi"><div class="kv" style="color:${k[0]};font-size:32px">${k[1]}</div><div class="kl">${k[2]}</div></div>`).join('')}</div>`;
const bgR=dirs.map(r=>`<tr><td>${r.Directorate}</td><td class="n">${fn(r['The Ask'])}</td><td class="n">${fn(r.Allocated)}</td><td class="n">${fn(r['Budget to Date'])}</td><td class="n">${fn(r['Spend YTD'])}</td><td class="n">${fn(r.Remaining)}</td><td class="n">${fp(r['Pct Used'])}</td><td><span class="badge b${sc(r['Budget Status'])}">${r['Budget Status']||''}</span></td></tr>`).join('');
SL.push(ct('Budget Overview — YTD',`${bgKPI}<table class="tb"><thead><tr><th>Department</th><th>Ask</th><th>Allocated</th><th>Budget TD</th><th>Spend YTD</th><th>Remaining</th><th>% Used</th><th>Status</th></tr></thead><tbody class="stg">${bgR}<tr class="tot"><td>Total</td><td class="n">${fn(tA)}</td><td class="n">${fn(tAl)}</td><td class="n">${fn(tBD)}</td><td class="n">${fn(tS)}</td><td class="n">${fn(tR)}</td><td class="n">${fp(tS/tBD)}</td><td></td></tr></tbody></table>${cmtBox(cfg['Budget Commentary'])}`));

// 6 PLATFORM PERFORMANCE
const eV=platforms.map(p=>pv(p.Engagement)),vV=platforms.map(p=>pv(p.Views)),fV=platforms.map(p=>pv(p.Followers));
const mE=Math.max(...eV)||1,mV=Math.max(...vV)||1,mF=Math.max(...fV)||1;
const bars=platforms.map((p,i)=>{const he=Math.round((eV[i]/mE)*90+8),hv=Math.round((vV[i]/mV)*90+8),hf=Math.round((fV[i]/mF)*90+8);
return`<div class="plt-col"><div class="plt-bw"><div class="plt-b e" style="height:0" data-h="${he}%"></div><div class="plt-b v" style="height:0" data-h="${hv}%"></div><div class="plt-b f" style="height:0" data-h="${hf}%"></div></div><div class="pn">${p.Name}</div><div class="pv">${p.Engagement}</div><div class="pd ${dc(p['Engagement QoQ'])}">${p['Engagement QoQ']}</div></div>`}).join('');
const webC=webs.map(w=>`<div class="ws"><div class="wv">${w.Sessions||w.Views||'—'}</div><div class="wl">${w.Name}</div><div class="wd ${dc(w['Sessions QoQ']||w['Views QoQ'])}">${w['Sessions QoQ']||w['Views QoQ']||''}</div></div>`).join('');
SL.push(ct('Digital Platform Performance — Network Overview',`<div class="plt-area"><div class="plt-bars">${bars}</div><div class="plt-side stg">${webC}</div></div><div class="legend"><span class="le">Engagement</span><span class="lv">Views</span><span class="lf">Followers</span></div>${cmtBox(cfg['Platform Commentary'])}`,'Q1 2025 – Q1 2026'));

// 7 HEATMAP
const hmP=['Facebook','TikTok','Instagram','YouTube','X Twitter','Web'];
SL.push(ct('Performance Heatmap — Brand × Platform',`<div style="font-size:13px;color:var(--w4);margin-bottom:12px;display:flex;gap:20px"><span class="g">▲ Growing</span><span style="color:var(--a)">▬ Flat</span><span class="r">▼ Declining</span><span style="color:var(--w15)">— Not active</span></div><div class="hm" style="grid-template-columns:180px repeat(6,1fr)"><div class="hh" style="background:transparent"></div>${hmP.map(p=>`<div class="hh">${p}</div>`).join('')}${hm.map(h=>`<div class="hb">${h.Brand}</div>${hmP.map(p=>`<div class="hc ${hmc(h[p])}">${h[p]||'—'}</div>`).join('')}`).join('')}</div>`,'Q1 2025 – Q1 2026'));

// 8-9 DEEP DIVES (2 directorates per slide, 2 rows × 3 columns)
for(let i=0;i<dives.length;i+=2){
const d1=dives[i],d2=dives[i+1];
const title=d2?`${d1.Directorate}  &  ${d2.Directorate}`:d1.Directorate;
let body=`<div class="dd2">`;
// Row 1
body+=`<div class="dd2-label">${d1.Directorate}</div>`;
body+=`<div class="dc d1"><h4>Q1 Initiative</h4><p>${d1['Q1 Initiative']||'—'}</p></div>`;
body+=`<div class="dc d2"><h4>Q1 Challenges</h4><p>${d1['Q1 Challenges']||'—'}</p></div>`;
body+=`<div class="dc d3"><h4>Q2 Priority</h4><p>${d1['Q2 Priority']||'—'}</p></div>`;
if(d2){
body+=`<div class="dd2-label">${d2.Directorate}</div>`;
body+=`<div class="dc d1"><h4>Q1 Initiative</h4><p>${d2['Q1 Initiative']||'—'}</p></div>`;
body+=`<div class="dc d2"><h4>Q1 Challenges</h4><p>${d2['Q1 Challenges']||'—'}</p></div>`;
body+=`<div class="dc d3"><h4>Q2 Priority</h4><p>${d2['Q2 Priority']||'—'}</p></div>`;
}
body+=`</div>`;
SL.push(ct('Directorate Deep Dives',body));
}

// 12 BRANDS
const brR=brands.map(b=>`<tr><td>${b.Name}</td><td>${b['Total Engagement']||''}</td><td class="${dc(b['Engagement QoQ'])}">${b['Engagement QoQ']||''}</td><td>${b['Total Views']||''}</td><td class="${dc(b['Views QoQ'])}">${b['Views QoQ']||''}</td><td>${b.Followers||''}</td><td class="${dc(b['Followers QoQ'])}">${b['Followers QoQ']||''}</td><td><span class="badge b${sc(b.Status)}">${b.Status||''}</span></td></tr>`).join('');
SL.push(ct('Digital Brands — Summary Overview',`<table class="bt"><thead><tr><th>Brand</th><th>Engagement</th><th>QoQ</th><th>Views</th><th>QoQ</th><th>Followers</th><th>QoQ</th><th>Status</th></tr></thead><tbody class="stg">${brR}</tbody></table>${cmtBox(cfg['Brands Commentary'])}`));

// 13 RISKS
const rCards=risks.map(r=>{const p=(r['Priority Level']||'').toLowerCase();return`<div class="rk"><div class="rv rv-${p==='high'?'h':p==='low'?'l':'m'}"></div><div style="flex:1"><h5>${r.Title||''}</h5><div class="rm"><span>${r.Category||''}</span><span>${r['Priority Level']||''}</span><span>${r.Owner||''}</span><span class="badge b${sc(r['Action Status']==='Open'?'OFF TRACK':r['Action Status']==='Monitoring'?'AT RISK':'ON TRACK')}">${r['Action Status']||''}</span></div><div class="rt">↳ ${r.Details||''}</div></div></div>`}).join('');
SL.push(ct('Risks & Issues Register',`<div class="stg" style="flex:1;display:flex;flex-direction:column;justify-content:center">${rCards}</div>`));

// 14 PRIORITIES
const prItems=prios.map(p=>`<div class="pi"><div class="pc pc-${(p.Category||'').toLowerCase()}">${p.Category||''}</div><div><div class="pp">${p.Title||''}</div><div class="po">Owner: ${p.Owner||'—'}</div></div></div>`).join('');
SL.push(ct('Q2 2026 Priorities & Key Milestones',`<div class="pl stg">${prItems}</div>`,'April – June 2026'));

// 15 DECISIONS
const deCards=decs.map((d,i)=>`<div class="de"><div class="dn">${String(i+1).padStart(2,'0')}</div><div class="dm"><h4>${d.Title||''}</h4><div class="ow">Owner: ${d.Owner||''}</div><div class="cx">${d.Details||''}</div><div class="opts">${d['Option A']?`<div class="opt">A: ${d['Option A']}</div>`:''}${d['Option B']?`<div class="opt">B: ${d['Option B']}</div>`:''}${d['Option C']?`<div class="opt">C: ${d['Option C']}</div>`:''}</div></div></div>`).join('');
SL.push(ct('Decisions Required from Leadership',`<div class="stg" style="flex:1;display:flex;flex-direction:column;justify-content:center">${deCards}</div>`,'Action required this session'));

// 16 THANK YOU
SL.push(`<div class="S S-cover" style="justify-content:center;align-items:center;padding:0;text-align:center"><canvas id="mesh2"></canvas>${str}<div class="cv" style="text-align:center">
<h1 style="font-size:72px;animation-delay:.3s">Thank You</h1>
<div class="c3" style="animation-delay:.6s">Al Jazeera Media Network</div>
<div style="color:var(--w4);font-size:16px;margin-top:10px;opacity:0;animation:fu .6s .8s forwards">Digital Division  ·  Quarterly Executive Report  ·  ${Q}</div>
<div style="margin-top:40px;border-top:2px solid var(--gold);display:inline-block;padding-top:16px;color:var(--w15);font-size:13px;opacity:0;animation:fu .6s 1s forwards">Appendices available on request  ·  Classification: ${cls}</div>
</div></div>`);

return SL;
}

// Mesh
function mesh(id){const c=document.getElementById(id);if(!c)return;const x=c.getContext('2d');c.width=1440;c.height=810;
const p=[];for(let i=0;i<55;i++)p.push({x:Math.random()*1440,y:Math.random()*810,vx:(Math.random()-.5)*.3,vy:(Math.random()-.5)*.3});
(function d(){x.clearRect(0,0,1440,810);p.forEach(q=>{q.x+=q.vx;q.y+=q.vy;if(q.x<0||q.x>1440)q.vx*=-1;if(q.y<0||q.y>810)q.vy*=-1;x.beginPath();x.arc(q.x,q.y,1.5,0,Math.PI*2);x.fillStyle='rgba(212,168,75,.2)';x.fill()});
for(let i=0;i<p.length;i++)for(let j=i+1;j<p.length;j++){const dx=p[i].x-p[j].x,dy=p[i].y-p[j].y,dist=Math.sqrt(dx*dx+dy*dy);if(dist<150){x.beginPath();x.moveTo(p[i].x,p[i].y);x.lineTo(p[j].x,p[j].y);x.strokeStyle=`rgba(212,168,75,${.05*(1-dist/150)})`;x.stroke()}}requestAnimationFrame(d)})()}

function animBars(){document.querySelectorAll('.plt-b[data-h]').forEach(b=>{b.style.transition='none';b.style.height='0';b.offsetHeight;b.style.transition='height 1.2s cubic-bezier(.22,1,.36,1)';setTimeout(()=>{b.style.height=b.dataset.h},50)})}

let cur=0,tot=0;
function go(d){const s=document.querySelectorAll('.S');s[cur].classList.remove('on');cur=Math.max(0,Math.min(tot-1,cur+d));s[cur].classList.add('on');upd();post()}
function goTo(i){const s=document.querySelectorAll('.S');s[cur].classList.remove('on');cur=Math.max(0,Math.min(tot-1,i));s[cur].classList.add('on');upd();post()}
function upd(){document.getElementById('ct').textContent=`${cur+1} / ${tot}`;document.getElementById('bp').disabled=cur===0;document.getElementById('bn').disabled=cur===tot-1;document.getElementById('P').style.width=((cur+1)/tot*100)+'%'}
function post(){if(cur===0)mesh('mesh');if(cur===tot-1)mesh('mesh2');setTimeout(animBars,100)}
document.addEventListener('keydown',e=>{if(e.key==='ArrowRight'||e.key===' '){e.preventDefault();go(1)}if(e.key==='ArrowLeft')go(-1)});

(async()=>{try{
const keys=Object.keys(T),vals=await Promise.all(Object.values(T).map(ft));
const D={};keys.forEach((k,i)=>D[k]=vals[i]);
const slides=build(D);tot=slides.length;
document.getElementById('D').innerHTML=slides.join('');
document.querySelectorAll('.S')[0].classList.add('on');
upd();mesh('mesh');
setTimeout(()=>document.getElementById('L').classList.add('done'),400);
}catch(e){document.querySelector('#L p').textContent='Error: '+e.message;console.error(e)}})();
</script>
